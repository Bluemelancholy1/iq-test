<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排行榜 - 金浩通智商测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #0a0a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .header { text-align: center; padding: 40px 20px 30px; position: relative; }
        .back-btn { position: absolute; left: 20px; top: 38px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #94a3b8; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 18px; }
        .trophy { font-size: 52px; margin-bottom: 10px; }
        .title { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 14px; color: #64748b; margin-top: 6px; }
        .content { max-width: 440px; margin: 0 auto; padding: 0 20px 40px; }
        .join-form { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        .join-title { font-size: 15px; color: #94a3b8; margin-bottom: 12px; text-align: center; }
        .name-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 10px; }
        .name-input::placeholder { color: #475569; }
        .name-input:focus { border-color: #f59e0b; }
        .join-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .join-btn:hover { opacity: 0.9; }
        .rank-list { }
        .rank-item { display: flex; align-items: center; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 8px; transition: all 0.2s; }
        .rank-item:hover { background: rgba(255,255,255,0.06); }
        .rank-item.top1 { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }
        .rank-item.top2 { background: rgba(148,163,184,0.08); border-color: rgba(148,163,184,0.2); }
        .rank-item.top3 { background: rgba(180,120,60,0.08); border-color: rgba(180,120,60,0.2); }
        .rank-num { font-size: 18px; font-weight: 700; width: 32px; text-align: center; color: #64748b; }
        .rank-item.top1 .rank-num { color: #fbbf24; }
        .rank-item.top2 .rank-num { color: #94a3b8; }
        .rank-item.top3 .rank-num { color: #cd7f32; }
        .rank-medal { font-size: 20px; }
        .rank-info { flex: 1; margin-left: 12px; }
        .rank-name { font-size: 15px; font-weight: 600; color: #e2e8f0; }
        .rank-time { font-size: 12px; color: #64748b; margin-top: 2px; }
        .rank-score { text-align: right; }
        .rank-score-val { font-size: 16px; font-weight: 700; color: #4ade80; }
        .rank-score-label { font-size: 11px; color: #64748b; }
        .empty { text-align: center; padding: 40px 0; color: #475569; font-size: 14px; }
        .loading { text-align: center; padding: 40px 0; color: #475569; font-size: 14px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .my-rank { background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(217,119,6,0.15)); border-color: rgba(245,158,11,0.3); }
        .my-rank .rank-name { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <div class="trophy">🏆</div>
        <div class="title">排行榜</div>
        <div class="subtitle">用时最短者名列前茅</div>
    </div>
    <div class="content">
        <div class="join-form">
            <div class="join-title">📝 参与排行</div>
            <input class="name-input" id="nameInput" type="text" placeholder="输入你的名字" maxlength="10">
            <button class="join-btn" id="joinBtn" onclick="startTest()">开始挑战 →</button>
        </div>
        <div class="rank-list" id="rankList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    // Supabase 配置
    const SB_URL = 'https://jufodimlnwkzxktrunjx.supabase.co';
    const SB_KEY = 'sb_publishable_sdXOBqMrwiQPHib0NW3zPg_0ihQwwHc';

    const MY_ID_KEY = 'iq_my_id';

    let myId = localStorage.getItem(MY_ID_KEY) || '';
    let savedName = localStorage.getItem('iq_player_name') || '';

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function fmtTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return m > 0 ? m + '分' + sec + '秒' : sec + '秒';
    }

    function getMedal(r) { return ['', '🥇', '🥈', '🥉'][r] || r; }

    // 从 Supabase 获取排行榜
    async function loadBoard() {
        try {
            const r = await fetch(SB_URL + '/rest/v1/leaderboard?select=*&order=time.asc&limit=30', {
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': 'Bearer ' + SB_KEY
                }
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const data = await r.json();
            renderList(data);
        } catch(e) {
            console.warn('Load failed:', e);
            document.getElementById('rankList').innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
        }
    }

    // 根据错题数计算评分（错3题以上80分以下）
    function getRating(score, total) {
        const wrong = total - score;
        let finalScore;
        if (wrong >= 3) {
            finalScore = Math.min(79, Math.round((score / total) * 100));
        } else {
            finalScore = Math.round((score / total) * 100);
        }
        
        if (finalScore >= 90) return { score: finalScore, title: '高高手' };
        if (finalScore >= 80) return { score: finalScore, title: '良好' };
        if (finalScore >= 60) return { score: finalScore, title: '不行再努力' };
        return { score: finalScore, title: '垃圾' };
    }

    function renderList(entries) {
        const list = document.getElementById('rankList');

        if (!entries || entries.length === 0) {
            list.innerHTML = '<div class="empty">暂无记录</div>';
            return;
        }

        // 去重：同 id 保留最优（得分高或用时短）
        const best = {};
        entries.forEach(e => {
            if (!best[e.id] || e.score > best[e.id].score ||
               (e.score === best[e.id].score && e.time < best[e.id].time)) best[e.id] = e;
        });
        const sorted = Object.values(best).sort((a, b) => a.time - b.time).slice(0, 20);

        if (sorted.length === 0) {
            list.innerHTML = '<div class="empty">暂无记录</div>';
            return;
        }

        list.innerHTML = sorted.map((item, i) => {
            const r = i + 1;
            const isMe = item.id === myId;
            const rating = getRating(item.score, item.total);
            return '<div class="rank-item' + (isMe ? ' my-rank' : '') + (r <= 3 ? ' top' + r : '') + '">' +
                '<div class="rank-num">' + getMedal(r) + '</div>' +
                '<div class="rank-info">' +
                '<div class="rank-name">' + item.name + '<span style="margin-left:20px;color:#94a3b8;">' + rating.score + '分 · ' + rating.title + '</span>' + (isMe ? ' <span style="color:#fbbf24;">★</span>' : '') + '</div>' +
                '<div class="rank-time">' + fmtTime(item.time) + '</div></div>' +
                '<div class="rank-score">' +
                '<div class="rank-score-val">' + item.score + '/' + item.total + '</div>' +
                '<div class="rank-score-label">正确率</div></div></div>';
        }).join('');
    }

    function startTest() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) { showToast('请输入名字'); return; }
        if (name.length < 2) { showToast('名字至少2个字符'); return; }

        if (!myId) {
            myId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            localStorage.setItem(MY_ID_KEY, myId);
        }
        localStorage.setItem('iq_player_name', name);
        window.location.href = 'index.html';
    }

    (function init() {
        if (savedName) {
            const ni = document.getElementById('nameInput');
            ni.value = savedName;
            ni.readOnly = true;
            ni.style.opacity = '0.6';
            const btn = document.getElementById('joinBtn');
            btn.textContent = '继续挑战 →';
            btn.onclick = () => { window.location.href = 'index.html'; };
        }
        loadBoard();
    })();
</script>
</body>
</html>
