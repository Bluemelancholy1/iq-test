<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全方位测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #08080c;
            --bg-card: #0f0f15;
            --accent: #00ff88;
            --accent2: #ff6b35;
            --accent3: #a855f7;
            --accent4: #3b82f6;
            --accent5: #ec4899;
            --accent6: #eab308;
            --text: #e8e8ec;
            --text-dim: #6b6b7a;
            --text-muted: #4a4a5a;
            --border: rgba(255,255,255,0.06);
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 25s ease-in-out infinite; }
        .orb-1 { width: 600px; height: 600px; top: -200px; left: -150px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); }
        .orb-2 { width: 500px; height: 500px; bottom: -200px; right: -150px; background: radial-gradient(circle, var(--accent3) 0%, transparent 70%); animation-delay: -12s; }
        .orb-3 { width: 400px; height: 400px; top: 40%; left: 60%; background: radial-gradient(circle, var(--accent4) 0%, transparent 70%); opacity: 0.2; animation-delay: -6s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .container { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }
        .header { text-align: center; margin-bottom: 24px; padding-top: 16px; }
        .logo-wrap { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--accent4), var(--accent3)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 20px rgba(59,130,246,0.25); }
        .logo { font-size: 32px; font-weight: 900; background: linear-gradient(135deg, var(--accent4), #6366f1, var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; }
        
        /* Start Screen */
        .start-screen { text-align: center; padding: 20px 16px 24px; }
        .start-hero { margin-bottom: 20px; }
        .hero-icon { width: 80px; height: 80px; margin: 0 auto 16px; background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(168,85,247,0.15)); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
        .start-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .start-desc { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .dimension-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
        .dimension-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; transition: all 0.3s ease; }
        .dimension-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
        .dimension-icon { font-size: 20px; margin-bottom: 6px; }
        .dimension-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
        .dimension-count { font-size: 10px; color: var(--text-muted); }
        .stats-row { display: flex; justify-content: center; gap: 32px; margin-bottom: 24px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--accent4), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px 24px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--accent4), #6366f1); color: #fff; font-weight: 700; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(59,130,246,0.35); }
        
        /* Question Screen */
        .question-screen { display: none; }
        .progress-container { margin-bottom: 20px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--text-dim); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent4), var(--accent3)); border-radius: 2px; transition: width 0.5s ease; }
        .dimension-tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
        .dim-tab { padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.25s; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text-dim); }
        .dim-tab.active { border-color: transparent; color: #fff; }
        .dim-tab[data-type="world"].active { background: rgba(0,255,136,0.15); }
        .dim-tab[data-type="consume"].active { background: rgba(255,107,53,0.15); }
        .dim-tab[data-type="life"].active { background: rgba(168,85,247,0.15); }
        .dim-tab[data-type="work"].active { background: rgba(59,130,246,0.15); }
        .dim-tab[data-type="social"].active { background: rgba(236,72,153,0.15); }
        .dim-tab[data-type="family"].active { background: rgba(234,179,8,0.15); }
        .card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 28px 24px; margin-bottom: 16px; position: relative; overflow: hidden; transition: all 0.3s ease; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
        .question-number { position: absolute; top: 12px; right: 20px; font-size: 80px; font-weight: 900; opacity: 0.03; color: var(--accent4); line-height: 1; }
        .question-type { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-world { background: rgba(0,255,136,0.12); color: var(--accent); }
        .type-consume { background: rgba(255,107,53,0.12); color: var(--accent2); }
        .type-life { background: rgba(168,85,247,0.12); color: var(--accent3); }
        .type-work { background: rgba(59,130,246,0.12); color: var(--accent4); }
        .type-social { background: rgba(236,72,153,0.12); color: var(--accent5); }
        .type-family { background: rgba(234,179,8,0.12); color: var(--accent6); }
        .question-text { font-size: 17px; font-weight: 500; line-height: 1.75; margin-bottom: 20px; color: var(--text); }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.25s ease; font-size: 14px; }
        .option:hover:not(.disabled) { background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.25); transform: translateX(4px); }
        .option.disabled { cursor: default; }
        .option.selected { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.4); }
        .option-label { width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; transition: all 0.25s; margin-top: 1px; }
        .option.selected .option-label { background: rgba(59,130,246,0.25); color: var(--accent4); }
        .option-text { flex: 1; line-height: 1.6; padding-top: 3px; }
        .explanation { display: none; margin-top: 20px; padding: 16px; background: rgba(59,130,246,0.06); border-radius: 12px; border: 1px solid rgba(59,130,246,0.15); font-size: 13px; line-height: 1.75; color: var(--text-dim); }
        .explanation strong { color: var(--accent4); }
        .btn-next { display: none; margin-top: 16px; }
        .btn-next.show { display: flex; }
        
        /* Result Screen */
        .result-screen { display: none; }
        .result-card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
        .result-header { text-align: center; margin-bottom: 24px; }
        .result-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .result-subtitle { color: var(--text-dim); font-size: 13px; }
        .score-overview { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .score-item { text-align: center; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 12px; min-width: 90px; }
        .score-item .score-icon { font-size: 18px; margin-bottom: 4px; }
        .score-item .score-value { font-size: 20px; font-weight: 700; }
        .score-item .score-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .score-item[data-type="world"] .score-value { color: var(--accent); }
        .score-item[data-type="consume"] .score-value { color: var(--accent2); }
        .score-item[data-type="life"] .score-value { color: var(--accent3); }
        .score-item[data-type="work"] .score-value { color: var(--accent4); }
        .score-item[data-type="social"] .score-value { color: var(--accent5); }
        .score-item[data-type="family"] .score-value { color: var(--accent6); }
        .result-section { margin-bottom: 20px; }
        .result-section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .result-section-content { font-size: 13px; line-height: 1.8; color: var(--text-dim); }
        .result-section-content strong { color: var(--text); }
        .name-input-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .name-input-label { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; }
        .name-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: rgba(255,255,255,0.03); color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: all 0.25s; }
        .name-input:focus { border-color: var(--accent4); background: rgba(59,130,246,0.05); }
        .name-input::placeholder { color: var(--text-muted); }
        .submit-btn { margin-top: 12px; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-grid"></div>
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-icon">🌏</div>
                <div class="logo">全方位测试</div>
            </div>
            <div class="subtitle">Worldview · Values · Life</div>
        </div>
        
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <div class="card">
                <div class="start-hero">
                    <div class="hero-icon">🧭</div>
                    <div class="start-title">探索你的价值观</div>
                    <div class="start-desc">6个维度 × 30道精选题目<br>深度了解你的世界观、消费观、生活态度</div>
                </div>
                
                <div class="dimension-grid">
                    <div class="dimension-item">
                        <div class="dimension-icon">🌱</div>
                        <div class="dimension-name">世界观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                    <div class="dimension-item">
                        <div class="dimension-icon">💰</div>
                        <div class="dimension-name">消费观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                    <div class="dimension-item">
                        <div class="dimension-icon">🏠</div>
                        <div class="dimension-name">生活观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                    <div class="dimension-item">
                        <div class="dimension-icon">💼</div>
                        <div class="dimension-name">工作观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                    <div class="dimension-item">
                        <div class="dimension-icon">👥</div>
                        <div class="dimension-name">社会观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                    <div class="dimension-item">
                        <div class="dimension-icon">❤️</div>
                        <div class="dimension-name">家庭观</div>
                        <div class="dimension-count">5题</div>
                    </div>
                </div>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value">30</div>
                        <div class="stat-label">总题数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">6</div>
                        <div class="stat-label">维度</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">~8</div>
                        <div class="stat-label">分钟</div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="startTest()">开始测试 →</button>
                <div style="text-align:center;margin-top:12px;">
                    <a href="assessment-leaderboard.html" style="color:var(--text-dim);font-size:12px;text-decoration:none;">查看排行榜 →</a>
                </div>
            </div>
        </div>
        
        <!-- Question Screen -->
        <div class="question-screen" id="questionScreen">
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">第 1 题 / 共 30 题</span>
                    <span id="dimensionProgress">世界观 1/5</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 3.33%"></div>
                </div>
            </div>
            
            <div class="dimension-tabs" id="dimensionTabs"></div>
            
            <div class="card" id="questionCard">
                <div class="question-number" id="questionNum">1</div>
                <div class="question-type" id="questionType">🌱 世界观</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
                <div class="explanation" id="explanation"></div>
            </div>
            
            <button class="btn btn-primary btn-next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
        </div>
        
        <!-- Result Screen -->
        <div class="result-screen" id="resultScreen">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-title">测试完成</div>
                    <div class="result-subtitle">以下是你的价值观分析报告</div>
                </div>
                <div class="score-overview" id="scoreOverview"></div>
                <div id="resultDetails"></div>
                
                <div class="name-input-section">
                    <div class="name-input-label">输入名字保存到排行榜：</div>
                    <input type="text" class="name-input" id="nameInput" placeholder="请输入你的名字" maxlength="20">
                    <button class="btn btn-primary submit-btn" onclick="submitResult()">提交结果 →</button>
                </div>
            </div>
            <div style="text-align:center;margin-top:12px;">
                <a href="assessment-leaderboard.html" style="color:var(--text-dim);font-size:12px;text-decoration:none;">查看排行榜 →</a>
            </div>
        </div>
    </div>
    
    <script>
        // 题库
        const questions = {
            world: [
                {
                    q: "你认为，一个人的命运主要取决于什么？",
                    options: [
                        "自身努力和选择，环境只是配角",
                        "时代和运气更重要，努力要顺势而为",
                        "家庭出身基本决定了人生上限",
                        "一切随缘，想太多没用"
                    ],
                    types: ["自主型", "顺势型", "结构型", "随缘型"],
                    explanation: "这反映了你对命运归因的基本看法：是相信个人能动性，还是更看重外部环境？"
                },
                {
                    q: "面对社会上的贫富差距，你的态度是？",
                    options: [
                        "这是正常现象，差距是努力程度不同的结果",
                        "差距可以存在，但不能太大，需要调节",
                        "差距过大是制度问题，需要根本性改变",
                        "无所谓，只要自己过得好就行"
                    ],
                    types: ["精英主义", "温和改良", "激进改革", "个人主义"],
                    explanation: "这体现了你对社会公平的基本立场：是接受现状、温和改革、还是追求平等？"
                },
                {
                    q: "你更倾向于相信哪句话？",
                    options: [
                        "天道酬勤，付出总有回报",
                        "谋事在人，成事在天",
                        "人算不如天算",
                        "机会是留给有准备的人的"
                    ],
                    types: ["努力论", "平衡论", "宿命论", "机会论"],
                    explanation: "这反映了你对努力与结果关系的核心信念。"
                },
                {
                    q: "如果你看到有人成功，你的第一反应是？",
                    options: [
                        "他一定付出了很多努力",
                        "他运气真好，赶上了好时候",
                        "他家庭背景应该不错",
                        "他有什么我不知道的方法或资源"
                    ],
                    types: ["归因努力", "归因运气", "归因背景", "归因资源"],
                    explanation: "你如何看待他人的成功，反映了你理解世界的基本框架。"
                },
                {
                    q: "你认为人生的意义是什么？",
                    options: [
                        "实现自我价值，成为更好的自己",
                        "为社会做贡献，让世界变好一点",
                        "过好自己的生活，照顾好家人",
                        "人生没有固定意义，自己定义就好"
                    ],
                    types: ["自我实现", "社会贡献", "家庭责任", "存在主义"],
                    explanation: "这是价值观的核心问题：你追求的是什么类型的人生意义？"
                }
            ],
            consume: [
                {
                    q: "看中一件很喜欢但超出预算的衣服，你会？",
                    options: [
                        "咬咬牙买下来，开心最重要",
                        "找类似的平替款，存钱更重要",
                        "等打折再买，耐心等待",
                        "根本不会超出预算，收入早就规划好了"
                    ],
                    types: ["即时满足", "理性规划", "延迟满足", "精打细算"],
                    explanation: "这反映了你的消费风格：是为当下买单，还是为未来储蓄？"
                },
                {
                    q: "你如何看待负债消费（信用卡、分期等）？",
                    options: [
                        "可以接受，先享受再还",
                        "适度可以，但不能超出还款能力",
                        "尽量避免，只在大件消费时考虑",
                        "完全不接受，有多少花多少"
                    ],
                    types: ["超前消费", "适度负债", "谨慎负债", "现金至上"],
                    explanation: "这反映了你对财务风险和即时满足的态度。"
                },
                {
                    q: "如果你突然获得一笔意外之财（比如奖金），你会？",
                    options: [
                        "犒劳自己，买一直想买的东西",
                        "存起来，增加安全感",
                        "投资理财，让钱生钱",
                        "一部分消费，一部分存起来"
                    ],
                    types: ["享乐型", "储蓄型", "投资型", "平衡型"],
                    explanation: "意外之财的处理方式，最能体现你的消费倾向。"
                },
                {
                    q: "买东西时，你更在意什么？",
                    options: [
                        "品牌和品质，贵一点没关系",
                        "性价比，不一定要最好的但要对得起价格",
                        "价格便宜，能用就行",
                        "是否真正需要，避免冲动消费"
                    ],
                    types: ["品质导向", "性价比导向", "价格导向", "理性导向"],
                    explanation: "这反映了你的消费决策逻辑：追求品质、性价比还是最低价格？"
                },
                {
                    q: "你如何看待「买买买」带来的快乐？",
                    options: [
                        "购物是重要的快乐来源，值得投入",
                        "购物能带来短暂的快乐，但不是长久之计",
                        "物质带来的快乐有限，精神满足更重要",

        function startTest() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'block';
            
            // 打乱题目顺序，但保持维度内顺序
            const types = ['world', 'consume', 'life', 'work', 'social', 'family'];
            allQuestions = [];
            types.forEach(type => {
                questions[type].forEach((q, i) => {
                    allQuestions.push({ ...q, type, indexInType: i + 1 });
                });
            });
            
            // 打乱整体顺序
            allQuestions = allQuestions.sort(() => Math.random() - 0.5);
            
            // 初始化维度标签
            const tabsHtml = types.map(t => 
                `<div class="dim-tab" data-type="${t}">${dimensionIcons[t]} ${dimensionNames[t]}</div>`
            ).join('');
            document.getElementById('dimensionTabs').innerHTML = tabsHtml;
            
            showQuestion();
        }
        
        function showQuestion() {
            const q = allQuestions[currentIndex];
            const typeConfig = typeColors[q.type];
            
            document.getElementById('progressText').textContent = `第 ${currentIndex + 1} 题 / 共 ${allQuestions.length} 题`;
            
            // 计算当前维度进度
            const typeCount = allQuestions.filter((item, idx) => item.type === q.type && idx <= currentIndex).length;
            document.getElementById('dimensionProgress').textContent = `${dimensionNames[q.type]} ${typeCount}/5`;
            
            document.getElementById('progressFill').style.width = `${((currentIndex + 1) / allQuestions.length) * 100}%`;
            
            // 更新维度标签高亮
            document.querySelectorAll('.dim-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === q.type);
            });
            
            document.getElementById('questionNum').textContent = currentIndex + 1;
            document.getElementById('questionType').className = `question-type ${typeConfig.class}`;
            document.getElementById('questionType').textContent = `${dimensionIcons[q.type]} ${dimensionNames[q.type]}`;
            document.getElementById('questionText').textContent = q.q;
            
            const optionsHtml = q.options.map((opt, i) => `
                <div class="option" onclick="selectAnswer(${i}, this)">
                    <div class="option-label">${['A', 'B', 'C', 'D'][i]}</div>
                    <div class="option-text">${opt}</div>
                </div>
            `).join('');
            document.getElementById('options').innerHTML = optionsHtml;
            
            document.getElementById('explanation').style.display = 'none';
            document.getElementById('explanation').innerHTML = `<strong>💡 解析：</strong>${q.explanation}<br><br>你的选择反映了<strong>${q.types[0]}</strong>倾向。`;
            document.getElementById('nextBtn').classList.remove('show');
        }
        
        function selectAnswer(index, el) {
            const card = el.closest('.card');
            if (card.querySelector('.option.disabled')) return;
            
            card.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
            el.classList.add('selected');
            
            const q = allQuestions[currentIndex];
            answers[`${q.type}_${q.indexInType}`] = index;
            scores[q.type] += index; // 用选项索引作为分数（0-3）
            
            document.getElementById('explanation').style.display = 'block';
            document.getElementById('nextBtn').classList.add('show');
        }
        
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= allQuestions.length) {
                showResult();
            } else {
                const card = document.getElementById('questionCard');
                card.style.opacity = '0';
                card.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                    card.style.transition = 'all 0.3s ease';
                    showQuestion();
                }, 200);
            }
        }
        
        function showResult() {
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            // 生成各维度得分概览
            const scoreOverviewHtml = Object.keys(scores).map(type => {
                const avg = scores[type] / 5;
                const percentage = Math.round((avg / 3) * 100);
                return `
                    <div class="score-item" data-type="${type}">
                        <div class="score-icon">${dimensionIcons[type]}</div>
                        <div class="score-value">${percentage}%</div>
                        <div class="score-label">${dimensionNames[type]}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('scoreOverview').innerHTML = scoreOverviewHtml;
            
            // 生成详细解析
            const resultDetails = [];
            const types = ['world', 'consume', 'life', 'work', 'social', 'family'];
            types.forEach(type => {
                const avg = scores[type] / 5;
                let tendency = '';
                if (avg <= 0.75) tendency = '倾向于 A 选项';
                else if (avg <= 1.5) tendency = '倾向于 A/B 之间';
                else if (avg <= 2.25) tendency = '倾向于 B/C 之间';
                else tendency = '倾向于 D 选项';
                
                resultDetails.push(`
                    <div class="result-section">
                        <div class="result-section-title">${dimensionIcons[type]} ${dimensionNames[type]}</div>
                        <div class="result-section-content">
                            平均得分倾向：${tendency}<br>
                            这反映了你在${dimensionNames[type]}方面的核心价值观。
                        </div>
                    </div>
                `);
            });
            document.getElementById('resultDetails').innerHTML = resultDetails.join('');
        }

            // 提交到 Supabase

            const SUPABASE_KEY = 'sb_publishable_sdXOBqMrwiQPHib0NW3zPg_0ihQwwHc';
