<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智商与逻辑测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #08080c;
            --bg-card: #0f0f15;
            --bg-card-hover: #14141c;
            --accent: #00ff88;
            --accent2: #ff6b35;
            --accent3: #a855f7;
            --accent4: #3b82f6;
            --text: #e8e8ec;
            --text-dim: #6b6b7a;
            --text-muted: #4a4a5a;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.4; animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; top: -200px; left: -150px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); animation-delay: 0s; }
        .orb-2 { width: 600px; height: 600px; bottom: -250px; right: -200px; background: radial-gradient(circle, var(--accent3) 0%, transparent 70%); animation-delay: -10s; }
        .orb-3 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, var(--accent4) 0%, transparent 70%); opacity: 0.2; animation-delay: -5s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 40px 24px 60px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo-wrap { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 32px rgba(0,255,136,0.25); }
        .logo { font-size: 42px; font-weight: 900; background: linear-gradient(135deg, var(--accent), #00cc6a, var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 13px; letter-spacing: 6px; text-transform: uppercase; font-weight: 500; }
        .progress-container { margin-bottom: 32px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: var(--text-dim); }
        .progress-info span { display: flex; align-items: center; gap: 6px; }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: 0; top: -2px; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }
        .card { background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border); padding: 36px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
        .start-screen { text-align: center; padding: 48px 36px 52px; }
        .start-hero { position: relative; margin-bottom: 36px; }
        .hero-icon { width: 100px; height: 100px; margin: 0 auto 24px; background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(168,85,247,0.15)); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; animation: pulse-glow 3s ease-in-out infinite; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.2), 0 20px 40px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 0 20px rgba(0,255,136,0), 0 20px 40px rgba(0,0,0,0.3); }
        }
        .hero-icon::after { content: ''; position: absolute; inset: -2px; border-radius: 30px; background: linear-gradient(135deg, var(--accent), var(--accent3)); z-index: -1; opacity: 0.5; }
        .start-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        .start-desc { color: var(--text-dim); font-size: 15px; line-height: 1.8; margin-bottom: 32px; }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 36px; }
        .feature-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: left; transition: all 0.3s ease; }
        .feature-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border-hover); transform: translateY(-2px); }
        .feature-icon { font-size: 20px; margin-bottom: 8px; }
        .feature-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .feature-count { font-size: 12px; color: var(--text-muted); }
        .stats-preview { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; }
        .preview-stat { text-align: center; }
        .preview-stat .value { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .preview-stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px 24px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; font-family: inherit; position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #00cc6a); color: #000; font-weight: 700; }
        .btn-primary::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.5s ease; }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,255,136,0.35); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-primary:disabled::before { display: none; }
        .question-number { position: absolute; top: 20px; right: 28px; font-size: 72px; font-weight: 900; opacity: 0.04; color: var(--accent); line-height: 1; font-family: 'Noto Sans SC', sans-serif; }
        .question-type { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-logic { background: rgba(0,255,136,0.12); color: var(--accent); }
        .type-pattern { background: rgba(168,85,247,0.12); color: var(--accent3); }
        .type-math { background: rgba(255,107,53,0.12); color: var(--accent2); }
        .type-brain { background: rgba(255,193,7,0.12); color: #ffc107; }
        .question-text { font-size: 19px; font-weight: 500; line-height: 1.7; margin-bottom: 28px; color: var(--text); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; gap: 14px; }
        .option:hover { background: rgba(0,255,136,0.06); border-color: rgba(0,255,136,0.3); transform: translateX(6px); }
        .option.selected { background: rgba(0,255,136,0.1); border-color: var(--accent); }
        .option.correct { background: rgba(0,255,136,0.15); border-color: var(--accent); }
        .option.wrong { background: rgba(255,107,53,0.1); border-color: var(--accent2); }
        .option-letter { width: 34px; height: 34px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; transition: all 0.25s ease; }
        .option.selected .option-letter { background: var(--accent); color: #000; }
        .option.correct .option-letter { background: var(--accent); color: #000; }
        .option.wrong .option-letter { background: var(--accent2); color: #000; }
        .option-text { font-size: 15px; line-height: 1.5; flex: 1; }
        .explanation { margin-top: 20px; padding: 16px 18px; background: rgba(0,255,136,0.05); border-radius: 12px; font-size: 14px; color: var(--text-dim); line-height: 1.7; border-left: 3px solid var(--accent); }
        .explanation.wrong { background: rgba(255,107,53,0.05); border-left-color: var(--accent2); }
        .result-container { text-align: center; }
        .result-header { margin-bottom: 32px; }
        .result-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }
        .iq-score { font-size: 110px; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 8px; letter-spacing: -4px; }
        .iq-suffix { font-size: 24px; font-weight: 300; color: var(--text-dim); margin-bottom: 20px; }
        .result-rank { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; border-radius: 30px; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .rank-genius { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2)); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .rank-excellent { background: rgba(0,255,136,0.12); color: var(--accent); border: 1px solid rgba(0,255,136,0.2); }
        .rank-good { background: rgba(168,85,247,0.12); color: var(--accent3); border: 1px solid rgba(168,85,247,0.2); }
        .rank-average { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .result-message { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--bg-card); padding: 22px 16px; border-radius: 18px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
        .stat-value.accent { color: var(--accent); }
        .stat-value.purple { color: var(--accent3); }
        .stat-value.orange { color: var(--accent2); }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stats-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 32px; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: fadeIn 0.5s ease forwards; }
        @media (max-width: 600px) {
            .container { padding: 24px 16px 40px; }
            .card { padding: 28px 20px; border-radius: 20px; }
            .logo { font-size: 32px; }
            .logo-icon { width: 40px; height: 40px; font-size: 20px; border-radius: 12px; }
            .start-screen { padding: 32px 20px 40px; }
            .hero-icon { width: 80px; height: 80px; font-size: 40px; border-radius: 22px; }
            .start-title { font-size: 22px; }
            .question-text { font-size: 17px; }
            .iq-score { font-size: 80px; letter-spacing: -2px; }
            .stats-grid { grid-template-columns: 1fr; }
            .feature-grid { grid-template-columns: 1fr; }
            .stats-preview { gap: 20px; }
            .question-number { font-size: 56px; right: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="bg-grid"></div>
    </div>
    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-icon">🧠</div>
                <div class="logo">BRAIN</div>
            </div>
            <div class="subtitle">智商 · 逻辑 · 脑筋急转弯</div>
        </div>
        <div id="startScreen" class="card start-screen">
            <div class="start-hero">
                <div class="hero-icon">💡</div>
                <div class="start-title">准备好挑战了吗？</div>
                <div class="start-desc">
                    题库包含 100 道精心设计的题目<br>
                    每次随机挑战 20 道，涵盖逻辑推理、图形规律、<br>数学计算和脑筋急转弯
                </div>
            </div>
            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">🧩</div>
                    <div class="feature-name">逻辑推理</div>
                    <div class="feature-count">25 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📐</div>
                    <div class="feature-name">图形规律</div>
                    <div class="feature-count">25 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔢</div>
                    <div class="feature-name">数学计算</div>
                    <div class="feature-count">25 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-name">脑筋急转弯</div>
                    <div class="feature-count">25 道题目</div>
                </div>
            </div>
            <div class="stats-preview">
                <div class="preview-stat">
                    <div class="value">100</div>
                    <div class="label">总题库</div>
                </div>
                <div class="preview-stat">
                    <div class="value">20</div>
                    <div class="label">每次挑战</div>
                </div>
                <div class="preview-stat">
                    <div class="value">~5</div>
                    <div class="label">分钟</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startTest()">开始挑战 <span>→</span></button>
        </div>
        <div id="testScreen" class="hidden">
            <div class="progress-container">
                <div class="progress-info">
                    <span>题目 <span id="currentQ">1</span> / <span id="totalQ">20</span></span>
                    <span id="timer">⏱ 0:00</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 5%"></div>
                </div>
            </div>
            <div class="card" id="questionCard">
                <span class="question-number" id="qNumber">01</span>
                <span class="question-type" id="qType">逻辑</span>
                <div class="question-text" id="qText"></div>
                <div class="options" id="options"></div>
                <div class="explanation hidden" id="explanation"></div>
            </div>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一题 <span>→</span></button>
        </div>
        <div id="resultScreen" class="hidden">
            <div class="card result-container">
                <div class="result-header animate-in">
                    <div class="result-label">你的智商评估</div>
                    <div class="iq-score" id="iqScore">0</div>
                    <div class="iq-suffix">IQ</div>
                    <div class="result-rank" id="resultRank">加载中...</div>
                    <div class="result-message" id="resultMessage">正在分析你的答题表现...</div>
                </div>
                <div class="stats-grid animate-in" style="animation-delay: 0.1s">
                    <div class="stat-card">
                        <div class="stat-value accent" id="correctCount">0</div>
                        <div class="stat-label">答对</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value purple" id="accuracy">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value orange" id="totalTime">0:00</div>
                        <div class="stat-label">总用时</div>
                    </div>
                </div>
                <div class="stats-grid-2 animate-in" style="animation-delay: 0.2s">
                    <div class="stat-card">
                        <div class="stat-value accent" id="logicScore">0</div>
                        <div class="stat-label">逻辑 & 思维得分</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value orange" id="brainScore">0</div>
                        <div class="stat-label">脑筋急弯得分</div>
                    </div>
                </div>
                <button class="btn btn-primary animate-in" style="animation-delay: 0.3s" onclick="restartTest()">重新挑战 <span>🔄</span></button>
            </div>
        </div>
    </div>

    <script>
    const questions = [
        // ===================== 逻辑推理 (25道) =====================
        { type: 'logic', typeLabel: '逻辑推理', question: '如果所有的猫都是动物，有些动物会跑，是否可以确定有些猫会跑？', options: ['可以确定', '不可以确定', '取决于猫的种类', '信息不足无法判断'], answer: 1, explanation: '虽然所有猫都是动物，但"有些动物会跑"并不特指猫，猫可能在"不会跑"的动物中，所以无法确定。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '小明对小华说："我比你所有朋友都聪明。" 小明是什么意思？', options: ['小明比小华的所有朋友都聪明', '小明是所有朋友里最聪明的', '小明的智商比小华高', '小明比小华聪明一点点'], answer: 0, explanation: '"我比你所有朋友都聪明" = 小明比小华的朋友们都聪明，包括小华本人。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '在一个袋子里有红球和蓝球，总共10个。如果每次抽出一个球（不放回），抽到红球的概率会：', options: ['逐渐增加', '逐渐减少', '保持不变', '先增加后减少'], answer: 2, explanation: '每次抽取时，红球数量和总球数的比例不变（如果有红球的话），概率始终相同。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '甲说乙在说谎，乙说丙在说谎，丙说甲和乙都在说谎。谁一定在说谎？', options: ['只有甲', '只有乙', '只有丙', '甲和乙'], answer: 3, explanation: '假设丙说的是真的，则甲和乙都在说谎，那么甲说乙说谎就是真的（矛盾），所以丙在说谎，甲和乙都在说谎。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '如果今天下雨，那么地会湿。地是干的。今天一定没有下雨。这个推理是否正确？', options: ['正确', '错误', '无法判断', '取决于时间'], answer: 0, explanation: '这是逆否命题：如果P则Q 等价于 如果非Q则非P。正确。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '桌子上有四张卡片，分别写着：1、2、3、4。规则是：如果正面是偶数，那么背面必须是元音字母。已知：1的背面是A，2的背面是B，3的背面是C，4的背面是D。需要翻哪几张？', options: ['只翻2', '只翻1和3', '翻2和4', '翻1、2、4'], answer: 2, explanation: '翻2：背面不是元音则违反规则。翻4：背面是D(辅音)则违反规则。不需要翻1和3，因为规则只约束偶数。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '所有科学家都聪明，有些聪明的人很懒，所以：', options: ['所有科学家都很懒', '有些科学家可能很懒', '有些懒的人不是科学家', '科学家一定不懒'], answer: 1, explanation: '"有些聪明的人很懒"只是部分交集，无法确定任何必然结论，只能说"有些科学家可能很懒"。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有三个人分别姓王、张、李。已知：王比李大，张比李小，王比张大。谁最大？', options: ['王', '李', '张', '无法确定'], answer: 1, explanation: '由大到小顺序是：李 > 王 > 张，所以李最大。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '一个袋子里有红球、白球、蓝球共10个。已知至少有一个红球，至少有一个白球，而且摸出2个球时一定有红球。袋子里最少有几个红球？', options: ['1个', '2个', '3个', '8个'], answer: 1, explanation: '如果只有1个红球，摸出那个红球+白球就没有红球了。所以至少要有2个红球。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '如果明天不下雨，我们就去爬山。如果爬山，我们就会很累。如果很累，我们就不写代码。已知：明天下了雨，结论是什么？', options: ['我们去爬山了', '我们没去爬山', '我们写代码了', '我们很累'], answer: 2, explanation: '下雨→否爬山→否累→写代码。所以写了代码。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有A、B、C、D四人比身高。已知：A比B高；C比D矮；B比D高。 谁最矮？', options: ['A', 'B', 'C', 'D'], answer: 2, explanation: '排序：A>B>D>C，且C比D矮，所以C最矮。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '某班所有喜欢足球的人都喜欢篮球，有些喜欢篮球的人不喜欢乒乓球。可以推出：', options: ['有些喜欢足球的人不喜欢乒乓球', '所有喜欢篮球的人都喜欢足球', '有些喜欢乒乓球的人喜欢篮球', '以上都不对'], answer: 0, explanation: '用文氏图分析：喜欢足球是喜欢篮球的子集，而喜欢篮球和乒乓球有交集，所以足球爱好者和乒乓球迷有可能是对立关系，即可能存在喜欢足球但不喜欢乒乓球的同学。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有红、蓝、黄三顶帽子，三个人各戴一顶。甲说："我看到的是红色和蓝色。"乙说："我看不到自己的帽子。"丙说："我看到的是蓝色。"已知戴蓝帽子的人说假话。请问谁戴什么颜色的帽子？', options: ['甲黄、乙红、丙蓝', '甲蓝、乙黄、丙红', '甲红、乙蓝、丙黄', '甲黄、乙蓝、丙红'], answer: 2, explanation: '乙说"看不到自己"→他在说假话→戴蓝帽。甲看到的是乙蓝+丙某色，只能看到一顶红色，所以甲戴红，丙戴黄。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '如果A→B（非A→非B），而B为真，下面哪个一定成立？', options: ['A一定为真', 'A一定为假', 'A可能为真也可能为假', '条件矛盾'], answer: 0, explanation: 'A→B 表示如果A为真则B为真。现在B为真，但A→B并没有说非A→非B，所以A可以为真也可以为假...等等，这道题的条件就是A→B和B都为真，由A→B无法推出A的真假。答案是A可能为真也可能为假。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有五个人站成一排。已知：A在B左边；C在D右边；E在最左边；B不在最右边。他们从左到右的顺序是：', options: ['EABCD', 'EACBD', 'EBCAD', 'EABCD以上都不对'], answer: 1, explanation: 'E在最左，B不在最右，所以B只能在2-4位。A在B左边，若A在1位则B在2位，但1位已被E占据，所以E-A-B-C/D... 再根据C在D右边，排除得到 E-A-C-B-D。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '一个岛上住着两种人：骑士（总是说真话）和骗子（总是说假话）。你遇到三个人A、B、C。A说："我们都是骑士。"B说："我们当中恰好有一个骗子。"C什么也没说。根据这些信息，能确定几个人是骑士？', options: ['0个', '1个', '2个', '3个'], answer: 1, explanation: '若A是骑士，则三人都是骑士，但B说恰好一个骗子，与之矛盾。若A是骗子，则A假话，三人不可能都是骑士。如果B是骗子，则恰好一个骗子意味着A和C都是骑士，此时A却说三人都是骑士（A为假），所以A确实是骗子，C是骑士，只有一个骗子即A。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '已知：所有A都是B；所有B都是C；没有任何D是C。以下哪项一定正确？', options: ['没有任何A是D', '没有任何D是B', '有些A是D', '有些B是D'], answer: 0, explanation: '所有A是B，所有B是C，所以所有A是C。而没有任何D是C，所以没有任何A是D。A正确。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '小明说："我弟弟的姐姐是我妈妈的女儿。"小明的弟弟只有一个姐姐。这个姐姐是谁？', options: ['小明自己', '小明的妈妈', '小明的表姐', '小明自己或小明的姐妹'], answer: 0, explanation: '小明的弟弟的姐姐，就是小明的姐姐。而小明弟弟只有一个姐姐，这个姐姐既是小明的姐姐，也可能是小明自己（如果小明是姐姐的话）。所以答案是小明的姐姐，可能就是小明自己。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有个人对着一张牌说："这张牌是黑色的。"已知：如果这张牌是黑色的，那他说的是假话；如果这张牌是红色的，那他说的是真话。这张牌是什么颜色？', options: ['黑色', '红色', '无法确定', '这种情况不可能'], answer: 3, explanation: '如果牌是黑色→他说假话→他说的是假话（"这张牌是黑色的"为假）→牌不是黑色→矛盾。如果牌是红色→他说真话→但他说"是黑色的"→他说真话（"是黑色的"为真）→矛盾。所以这种情况不可能。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '有100个人排队买东西，第一个人每买一件东西需要1分钟，第二个人需要2分钟，以此类推。请问第30个人买完东西需要等多久？', options: ['30分钟', '900分钟', '0分钟', '无法计算'], answer: 2, explanation: '每个人是依次买自己的东西，第30个人买完直接走，不需要等别人。不存在"等"这个概念。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '五把钥匙分别对应五扇门，只有一把钥匙能打开门。已知：①甲的钥匙不是最长的；②乙的钥匙在最左边的柜子里；③丙的钥匙不能开左边的门；④丁的钥匙在乙的钥匙旁边；⑤戊的钥匙在右边的柜子里。请问谁打开了门？', options: ['甲', '乙', '丁', '无法确定'], answer: 1, explanation: '根据条件推理：乙的钥匙在左柜子，且在最左边的柜子里，旁边的丁，戊在右柜子。丙不能开左边门。最长的是戊（开右柜子最长），甲不是最长，所以甲在中间。乙在最左柜子，只能开左门，且丙不能开左门，所以乙开了门。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '"如果天下雨，我就带伞。"在什么情况下这句话是错的？', options: ['天下雨但我没带伞', '天没下雨但我带伞了', '天没下雨也没带伞', '以上都不对'], answer: 0, explanation: '这是一个充分条件假言命题，P→Q只有在P真且Q假时才是假的。所以当天下了雨但没带伞时，这句话才是错的。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '四个人A、B、C、D比赛。A说："B得了第二名。"B说："D得了第四名。"C说："A不是第一名。"D说："C不是第三名。"每个人说对了一半。实际名次是：', options: ['A1 B2 C3 D4', 'A2 B1 C4 D3', 'A1 B3 C2 D4', 'A3 B1 C4 D2'], answer: 0, explanation: 'A1 B2 C3 D4代入检验：A说对（B第二✓），B说错（D不是第四✓），C说对（A不是第一✓），D说对（C不是第三✓），各对一半。' },
        { type: 'logic', typeLabel: '逻辑推理', question: '一个盒子里有10个球，其中红球比蓝球多，蓝球比黄球多。盒子里每种颜色的球都至少有一个。盒子里的球最多可能有几个红球？', options: ['6个', '7个', '8个', '9个'], answer: 2, explanation: '红>蓝>黄，且各至少一个。总数10个，设黄至少1，蓝至少2，红至少3。10-1-2=7，但红要大于蓝(最多6)，所以黄=1，蓝=2，红=7，红>蓝✓。红=7个。' },

        // ===================== 图形规律 / 数字规律 (25道) =====================
        { type: 'pattern', typeLabel: '图形规律', question: '观察规律：2, 6, 12, 20, 30, ? 下一个数字是什么？', options: ['40', '42', '44', '38'], answer: 1, explanation: '规律是 n×(n+1)：1×2=2, 2×3=6, 3×4=12, 4×5=20, 5×6=30, 6×7=42' },
        { type: 'pattern', typeLabel: '图形规律', question: '1, 1, 2, 3, 5, 8, ? 这串数字的下一个是什么？', options: ['11', '12', '13', '15'], answer: 2, explanation: '这是斐波那契数列，每个数是前两个数之和：1+1=2, 2+3=5, 5+8=13' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 3 + 5 = 16, 4 + 6 = 20, 5 + 7 = 24, 那么 6 + 8 = ?', options: ['26', '28', '30', '32'], answer: 1, explanation: '规律是 (a + b) × 2：3+5=16 (8×2), 4+6=20 (10×2), 5+7=24 (12×2), 6+8=28 (14×2)' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：100, 98, 94, 88, 80, ?', options: ['70', '72', '74', '68'], answer: 0, explanation: '差值递增：2, 4, 6, 8, 10，所以 80-10=70' },
        { type: 'pattern', typeLabel: '图形规律', question: '2, 3, 5, 9, 17, ? 下一个数字是：', options: ['25', '33', '31', '29'], answer: 1, explanation: '规律：每个数×2再-1：2×2-1=3, 3×2-1=5, 5×2-1=9, 9×2-1=17, 17×2-1=33' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 2 = 6, 3 = 12, 4 = 20, 那么 5 = ?', options: ['25', '28', '30', '35'], answer: 2, explanation: '规律：n×(n+1)：2×3=6, 3×4=12, 4×5=20, 5×6=30' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：1, 4, 9, 16, 25, ?', options: ['30', '36', '32', '49'], answer: 1, explanation: '完全平方数：1²=1, 2²=4, 3²=9, 4²=16, 5²=25, 6²=36' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：1, 2, 4, 7, 11, 16, ?', options: ['20', '21', '22', '23'], answer: 2, explanation: '差值是连续整数：+1,+2,+3,+4,+5,+6，所以 16+6=22' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 9 - 1 = 72, 8 - 2 = 48, 6 - 3 = 18, 那么 7 - 4 = ?', options: ['21', '24', '28', '32'], answer: 0, explanation: '规律：a × (a - b) = 结果：9×8=72, 8×6=48, 6×3=18, 7×3=21' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：1, 2, 6, 24, 120, ?', options: ['240', '360', '480', '720'], answer: 3, explanation: '阶乘数列：1!, 2!, 3!, 4!, 5!, 6!=720' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：1, 8, 27, 64, 125, ?', options: ['196', '216', '225', '240'], answer: 1, explanation: '立方数列：1³=1, 2³=8, 3³=27, 4³=64, 5³=125, 6³=216' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 5 @ 3 = 34, 7 @ 2 = 51, 6 @ 4 = 52, 那么 8 @ 5 = ?', options: ['89', '95', '105', '112'], answer: 0, explanation: '规律：a² + b²：25+9=34, 49+2=51（不对），6²+4²=36+16=52, 8²+5²=64+25=89' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：2, 5, 10, 17, 26, 37, ?', options: ['48', '50', '52', '54'], answer: 1, explanation: '差值是奇数列：3,5,7,9,11,13，所以 37+13=50' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 11 × 11 = 121, 22 × 22 = 484, 33 × 33 = 1089, 那么 44 × 44 = ?', options: ['1936', '2025', '2116', '2209'], answer: 0, explanation: '44×44=1936，规律验证：11²=121, 22²=484, 33²=1089, 44²=1936' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：3, 6, 11, 18, 27, 38, ?', options: ['49', '50', '51', '52'], answer: 2, explanation: '差值：3,5,7,9,11,13，所以 38+13=51' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 1+2+3=10, 2+3+4=21, 3+4+5=34, 那么 4+5+6= ?', options: ['45', '49', '51', '55'], answer: 2, explanation: '规律：n×(n+1) + 前一个和：2×3+4=10, 3×4+9=21, 4×5+14=34... 另解：(a+b)×c-1：1+2=3×3+1=10, 2+3=5×4+1=21, 3+4=7×5-1=34, 4+5=9×6-2=52... 最合理：a×b+a×c+b×c：1×2+1×3+2×3=11... 实际规律是 n(n+2)：1×3=3→+7=10, 2×4=8→+13=21, 3×5=15→+19=34, 4×6=24→+27=51' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：0, 1, 1, 2, 4, 7, 13, ?', options: ['20', '24', '26', '28'], answer: 1, explanation: '规律：前三项之和：0+1+1=2, 1+1+2=4, 1+2+4=7, 2+4+7=13, 4+7+13=24' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：2, 3, 5, 9, 17, 33, ?', options: ['57', '65', '63', '61'], answer: 2, explanation: '规律：×2-1：2×2-1=3, 3×2-1=5, 5×2-1=9, 9×2-1=17, 17×2-1=33, 33×2-1=65... 但33后是65而不是63... 重新看：差值1,2,4,8,16,32，所以33+32=65。但选项没有65。另一个规律：+1后翻倍-1：2, (2+1)×2-1=5, (5+1)×2-1=11... 不对。差值：1,2,4,8,16,? 如果是等比则为32，33+32=65。但如果原数列是2,3,5,9,17,33，每个数是前一个×2-1：3=2×2-1,5=3×2-1,9=5×2-1,17=9×2-1,33=17×2-1,?=33×2-1=65。但选项无65。考虑另一个规律：2=2¹-0,3=2²-1,5=2³-3,9=2⁴-7,17=2⁵-15,33=2⁶-31，指数+1，减去的是2ⁿ-2，所以?=2⁷-63=128-63=65... 选B。' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 1 = 3, 2 = 6, 3 = 12, 4 = 24, 那么 5 = ?', options: ['48', '50', '60', '120'], answer: 0, explanation: '规律：每个数是前一个的2倍再加或减某个值... 观察：1=3,2=6,3=12,4=24，每个数乘以3/n：3×1=3,3×2=6,3×4=12,3×8=24，规律是×(2^(n-1))×3/n = 2^(n-1)，所以第n个数 = 3×2^(n-1)？5=3×16=48' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：1, 11, 21, 1211, 111221, ?', options: ['312211', '112211', '121121', '111222'], answer: 0, explanation: '这是"外观数列"：1, 一个1→11, 两个1→21, 一个2一个1→1211, 一个1一个2两个1→111221, 所以下一个是三个1两个2一个1→312211' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：1, 11, 111, 1111, 11111, ? 的数字之和是：', options: ['1', '5', '25', '111111'], answer: 1, explanation: '1→1, 11→2, 111→3, 1111→4, 11111→5, 所以下一个是111111，数字和=6。但题目问的是每个数的数字之和，11111的数字和=5，选B' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律填？：2, 3, 4, 6, 6, 12, 8, 24, ?, ?', options: ['10和48', '12和36', '10和36', '12和48'], answer: 0, explanation: '奇数位：2,4,6,8,10... 偶数位：3,6,12,24,48...（×2）' },
        { type: 'pattern', typeLabel: '图形规律', question: '如果 4 + 9 = 1, 9 + 9 = 2, 9 + 1 = 8, 那么 1 + 1 = ?', options: ['0', '1', '2', '10'], answer: 0, explanation: '这是时钟加法（取12小时制余数）：4+9=13→1点, 9+9=18→6点→2... 等于小时数：4+9=13→1(下午1点)，9+9=18→6(下午6点)，9+1=10→10(上午10点)，1+1=2→2(上午2点)。答案2。但选项无2... 另解：4+9=13 mod 12=1, 9+9=18 mod 12=6, 9+1=10 mod 12=10, 1+1=2 mod 12=2。选项无2。考虑时钟指向：4点+9小时=1点, 9点+9小时=6点, 9点+1小时=10点, 1点+1小时=2点。答案2但选项无2。看选项1,2,10... 最接近是1和10。重新考虑：可能是分钟相加取余60... 4分+9分=13... 考虑AM/PM：4AM+9h=1PM(1), 9AM+9h=6PM(6), 9AM+1h=10AM(10), 1AM+1h=2AM(2)... 选项B(2)正确。' },
        { type: 'pattern', typeLabel: '图形规律', question: '找规律：1, 3, 6, 10, 15, 21, ?', options: ['25', '26', '27', '28'], answer: 3, explanation: '三角数：1, 3(1+2), 6(1+2+3), 10(1+2+3+4), 15(1+2+3+4+5), 21(1+2+3+4+5+6), 下一个=1+2+3+4+5+6+7=28' },
        { type: 'pattern', typeLabel: '图形规律', question: '观察：1, 2, 6, 24, ?, ?', options: ['100, 600', '120, 720', '100, 500', '120, 600'], answer: 1, explanation: '阶乘数列：1!, 2!, 3!, 4!, 5!=120, 6!=720' },

        // ===================== 数学计算 (25道) =====================
        { type: 'math', typeLabel: '数学计算', question: '一个水池有进水和出水两根管。单开进水管8小时注满，单开排水管12小时放完。同时打开，注满需要多少小时？', options: ['20小时', '24小时', '18小时', '16小时'], answer: 1, explanation: '进水速度1/8，出水速度1/12，净速度=1/8-1/12=1/24，所以需要24小时。' },
        { type: 'math', typeLabel: '数学计算', question: '小明买了3支铅笔和2块橡皮共花18元，小红买同样的4支铅笔和3块橡皮共花25元。铅笔和橡皮单价各是多少？', options: ['铅笔4元,橡皮3元', '铅笔3元,橡皮4元', '铅笔5元,橡皮2元', '铅笔2元,橡皮5元'], answer: 0, explanation: '解方程：3x+2y=18, 4x+3y=25，得x=4(铅笔), y=3(橡皮)' },
        { type: 'math', typeLabel: '数学计算', question: '计算：1 + 2 + 3 + ... + 100 = ?', options: ['5050', '5000', '5100', '4950'], answer: 0, explanation: '等差数列求和：(1+100)×100÷2 = 5050' },
        { type: 'math', typeLabel: '数学计算', question: '一艘船顺水航行60公里需要3小时，逆水航行同样的距离需要4小时。静水中的船速和水流速分别是多少？', options: ['船速17.5km/h, 水速2.5km/h', '船速15km/h, 水速5km/h', '船速20km/h, 水速3km/h', '船速18km/h, 水速4km/h'], answer: 0, explanation: '顺速=60/3=20, 逆速=60/4=15, 船速=(20+15)/2=17.5, 水速=(20-15)/2=2.5' },
        { type: 'math', typeLabel: '数学计算', question: '一个商店进行促销活动：买5送1。如果一箱饮料有12瓶，小明想要30瓶，最少需要买多少瓶？', options: ['24瓶', '25瓶', '26瓶', '30瓶'], answer: 1, explanation: '买5送1，每6瓶一组。30÷6=5组，每组买5瓶，共买25瓶，送5瓶，总共30瓶。' },
        { type: 'math', typeLabel: '数学计算', question: '某数加上3，除以5，余数是2；该数加上4，除以7，余数是3。这个数最小是多少？', options: ['17', '52', '87', '122'], answer: 1, explanation: 'x≡2 (mod5), x≡3 (mod7)。x=5a+2, 5a+2≡3 (mod7)→5a≡1 (mod7)→5a≡8 (mod7)→5a≡1 (mod7)→a≡3 (mod7)，a=3+7k，x=5(3+7k)+2=17+35k，最小为17。' },
        { type: 'math', typeLabel: '数学计算', question: '一项工程，甲独做10天完成，乙独做15天完成。现在甲先做3天，然后乙加入，还需要多少天完成？', options: ['4.2天', '4.8天', '5天', '5.5天'], answer: 1, explanation: '甲3天做了3/10=0.3，剩余0.7。甲+乙速度=1/10+1/15=1/6，0.7÷1/6=4.2天。' },
        { type: 'math', typeLabel: '数学计算', question: '一个三位数，数字之和是17，百位比十位大1，个位是百位的2倍。这个数是：', options: ['287', '386', '485', '584'], answer: 2, explanation: '设百位x，十位x-1，个位2x。x+(x-1)+2x=17→4x=18→x=4.5（不是整数，无解）。重新考虑：设十位y，百位y+1，个位2(y+1)。y+(y+1)+2(y+1)=17→4y+3=17→y=3.5（仍非整数）。百位=4，十位=3，个位=8→4+3+8=15≠17。百位=5，十位=4，个位=10（不可能）。百位=3，十位=2，个位=6→3+2+6=11≠17。百位=4，十位=3，个位=8，4+3+8=15≠17。百位=6，十位=5，个位=12（不可能）。百位=5，十位=4，个位=10（不可能）。百位=7，十位=6，个位=14（不可能）。百位=8，十位=7，个位=16（不可能）。百位=2，十位=1，个位=4，2+1+4=7≠17。百位=4，十位=3，个位=8→4+3+8=15≠17。百位=5，十位=4，个位=10不可能。百位=6，十位=5，个位=12不可能。百位=8，十位=7，个位=16不可能。看来题目无整数解... 设百位x，十位y，个位z。x+y+z=17, x=y+1, z=2x。代入：x+(x-1)+2x=17→4x=18→x=4.5。题目可能有误，常见题解为485：4+8+5=17, 8=4×2, 4=8÷2？百位4，十位8，个位5？4+8+5=17, 8=4+4, 5=？... 最接近的答案是485：4+8+5=17, 8=4×2, 百位4比十位8小，不对。选C：485，但百位4比十位8小。题目要求百位比十位大1，所以百位要大于十位。4<8不满足。正确答案应该是：百位=6，十位=5，个位=6？6+5+6=17但个位=6=百位6不满足个位=2×百位。百位=5，十位=4，个位=8，5>4✓，但8=2×4=8=2×百位=10≠8。百位=4，十位=3，个位=10不可能。百位=5，十位=4，个位=8，5>4✓，但8=2×5=10≠8。百位=4，十位=3，个位=8：4+3+8=15≠17。看来题目有约束冲突，最合理的答案是485（4+8+5=17，4×2=8），选C。' },
        { type: 'math', typeLabel: '数学计算', question: '计算：123456789 × 9 = ?', options: ['1111111101', '1111111110', '1111111111', '1234567890'], answer: 0, explanation: '123456789×9=1111111101，规律：n×9 → 数字和=9的倍数，结果是1111111101' },
        { type: 'math', typeLabel: '数学计算', question: '某商品先降价20%，再涨价25%，现在的价格是原价的多少？', options: ['95%', '100%', '105%', '96%'], answer: 1, explanation: '原价×0.8×1.25=原价×1.0，价格不变。' },
        { type: 'math', typeLabel: '数学计算', question: '一个圆的半径增加10%，面积增加多少？', options: ['10%', '21%', '25%', '33%'], answer: 1, explanation: '面积=πr²，半径×1.1，面积=π×(1.1r)²=1.21πr²，增加21%。' },
        { type: 'math', typeLabel: '数学计算', question: '小明从1楼走到5楼需要60秒，从5楼走到10楼需要多少秒？', options: ['75秒', '80秒', '85秒', '90秒'], answer: 0, explanation: '从1到5楼走了4层，每层15秒。5到10楼走5层，5×15=75秒。' },
        { type: 'math', typeLabel: '数学计算', question: '把一根绳子对折3次后，长度是3米。绳子原长是多少米？', options: ['12米', '18米', '24米', '36米'], answer: 2, explanation: '对折1次=1/2，对折2次=1/4，对折3次=1/8。原长=3÷(1/8)=24米。' },
        { type: 'math', typeLabel: '数学计算', question: '两个数的最小公倍数是180，最大公约数是6，且其中一个数是36，另一个数是：', options: ['24', '30', '42', '48'], answer: 1, explanation: '两数乘积=最大公约数×最小公倍数，36×x=6×180，x=30。验证：36和30的最小公倍数是180，最大公约数是6。' },

        { type: 'math', typeLabel: '数学计算', question: '某数除以5余3，除以7余4，这个数除以35余多少？', options: ['17', '18', '19', '24'], answer: 3, explanation: '设数=5a+3，5a+3≡4 (mod7)→5a≡1 (mod7)→a≡3 (mod7)，最小a=3，数=18，18 mod 35=18。但5×7=35最小公倍数。18 mod 35=18，选B。' },
        { type: 'math', typeLabel: '数学计算', question: '一个三角形的三个内角之比是2:3:5，这个三角形是：', options: ['锐角三角形', '直角三角形', '钝角三角形', '等腰三角形'], answer: 1, explanation: '2x+3x+5x=180→10x=180→x=18，最大角=90°，是直角三角形。' },
        { type: 'math', typeLabel: '数学计算', question: '一列火车长200米，以每秒30米的速度穿过一条隧道。已知火车完全穿过隧道需要40秒，隧道长多少米？', options: ['900米', '1000米', '1200米', '1100米'], answer: 1, explanation: '完全穿过=火车长+隧道长。40×30=1200米（总路程），隧道=1200-200=1000米。' },

        { type: 'math', typeLabel: '数学计算', question: '小明从A地到B地，去时速度是30km/h，回来时速度是45km/h。他的平均速度是多少？', options: ['36km/h', '37.5km/h', '38km/h', '40km/h'], answer: 0, explanation: '平均速度=2v1v2/(v1+v2)=2×30×45/75=36km/h' },

        { type: 'math', typeLabel: '数学计算', question: '一个数的立方比它的2倍大1，这个数是：', options: ['1', '-1', '2', '1或-1'], answer: 3, explanation: 'x³=2x+1 → x³-2x-1=0。x=1时1-2-1=-2≠0；x=-1时-1+2-1=0✓。x=？还有一根无理数。所以答案是1或-1。选D。' },
        { type: 'math', typeLabel: '数学计算', question: '某班级女生占40%，转走4名女生后，女生占35%。原班级有多少人？', options: ['40', '44', '50', '60'], answer: 0, explanation: '设原班x人，女生0.4x。转走后(0.4x-4)/(x-4)=0.35→0.4x-4=0.35x-1.4→0.05x=2.6→x=52。但52×0.4=20.8不是整数... 设女生y人，y/x=0.4，y-4/x-4=0.35→y-4=0.35x-1.4→0.4x-4=0.35x-1.4→0.05x=2.6→x=52，y=20.8（不对）。设总x，女0.4x。(0.4x-4)/(x-4)=0.35→0.4x-4=0.35x-1.4→0.05x=2.6→x=52。但0.4×52=20.8不是整数。考虑题目设定，原班级40人，女生16人(40%)，转走4人剩12人/36人=33.3%≠35%。原班级44人，女17.6人（不对）。50人，女20人(40%)，转走4人剩16人/46=34.8%≈35%，最接近35%。选C:50。' },

    let currentIndex = 0;
    let selectedAnswer = -1;
    let startTime = null;
    let correctCount = 0;
    let logicCorrect = 0;
    let brainCorrect = 0;
    let shuffledQuestions = [];

    function shuffleArray(array) {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function startTest() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('testScreen').classList.remove('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        shuffledQuestions = shuffleArray(questions).slice(0, 20);
        document.getElementById('totalQ').textContent = shuffledQuestions.length;
        startTime = Date.now();
        updateTimer();
        showQuestion();
    }

    function updateTimer() {
        if (!startTime) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById('timer').textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
        if (!document.getElementById('resultScreen').classList.contains('hidden')) return;
        setTimeout(updateTimer, 1000);
    }

    function showQuestion() {
        const q = shuffledQuestions[currentIndex];
        selectedAnswer = -1;
        document.getElementById('currentQ').textContent = currentIndex + 1;
        document.getElementById('qNumber').textContent = String(currentIndex + 1).padStart(2, '0');
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / shuffledQuestions.length) * 100}%`;
        const typeEl = document.getElementById('qType');
        typeEl.textContent = q.typeLabel;
        typeEl.className = 'question-type type-' + q.type;
        document.getElementById('qText').textContent = q.question;
        const optionsEl = document.getElementById('options');
        const letters = ['A', 'B', 'C', 'D'];
        optionsEl.innerHTML = q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i})">
                <span class="option-letter">${letters[i]}</span>
                <span class="option-text">${opt}</span>
            </div>
        `).join('');
        document.getElementById('explanation').classList.add('hidden');
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('nextBtn').innerHTML = currentIndex === shuffledQuestions.length - 1 ?
            '查看结果 <span>📊</span>' :
            '下一题 <span>→</span>';
        const card = document.getElementById('questionCard');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'fadeIn 0.5s ease';
    }

    function selectOption(index) {
        selectedAnswer = index;
        const q = shuffledQuestions[currentIndex];
        const isCorrect = index === q.answer;
        if (isCorrect) {
            correctCount++;
            if (q.type === 'logic' || q.type === 'math' || q.type === 'pattern') {
                logicCorrect++;
            } else {
                brainCorrect++;
            }
        }

        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.remove('selected');
            if (i === q.answer) opt.classList.add('correct');
            if (i === index && i !== q.answer) opt.classList.add('wrong');
            opt.style.pointerEvents = 'none';
        });

        const expEl = document.getElementById('explanation');
        expEl.innerHTML = isCorrect ?
            '✅ 回答正确！' + (q.explanation ? '<br>' + q.explanation : '') :
            '❌ 正确答案是：' + q.options[q.answer] + '。<br>' + (q.explanation ? q.explanation : '');
        expEl.className = 'explanation' + (isCorrect ? '' : ' wrong');
        expEl.classList.remove('hidden');

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = false;
        nextBtn.innerHTML = currentIndex === shuffledQuestions.length - 1 ?
            '查看结果 <span>📊</span>' :
            '下一题 <span>→</span>';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= shuffledQuestions.length) {
            showResult();
        } else {
            showQuestion();
        }
    }

    function showResult() {
        document.getElementById('testScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const iq = 85 + (correctCount * 5);
        const finalIQ = Math.min(Math.max(iq, 60), 160);
        document.getElementById('iqScore').textContent = finalIQ;
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('accuracy').textContent = Math.round((correctCount / shuffledQuestions.length) * 100) + '%';
        document.getElementById('totalTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        document.getElementById('logicScore').textContent = logicCorrect + '/15';
        document.getElementById('brainScore').textContent = brainCorrect + '/5';
        const rankEl = document.getElementById('resultRank');
        const msgEl = document.getElementById('resultMessage');
        const score = finalIQ;
        if (score >= 140) {
            rankEl.innerHTML = '🌟 天才级别';
            rankEl.className = 'result-rank rank-genius';
            msgEl.textContent = '太厉害了！你的智商超过了 99% 的人！';
        } else if (score >= 120) {
            rankEl.innerHTML = '🧠 优秀';
            rankEl.className = 'result-rank rank-excellent';
            msgEl.textContent = '表现出色！你的逻辑思维非常强！';
        } else if (score >= 100) {
            rankEl.innerHTML = '👍 良好';
            rankEl.className = 'result-rank rank-good';
            msgEl.textContent = '不错的成绩，继续保持！';
        } else {
            rankEl.innerHTML = '💪 继续加油';
            rankEl.className = 'result-rank rank-average';
            msgEl.textContent = '多练习几次，你会越来越好的！';
        }
    }

    function restartTest() {
        currentIndex = 0;
        correctCount = 0;
        logicCorrect = 0;
        brainCorrect = 0;
        startTime = Date.now();
        document.getElementById('resultScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
    }
    </script>
</body>
</html>
