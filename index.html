<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智商与逻辑测试</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #08080c;
            --bg-card: #0f0f15;
            --bg-card-hover: #14141c;
            --accent: #00ff88;
            --accent2: #ff6b35;
            --accent3: #a855f7;
            --accent4: #3b82f6;
            --text: #e8e8ec;
            --text-dim: #6b6b7a;
            --text-muted: #4a4a5a;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.4; animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; top: -200px; left: -150px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); animation-delay: 0s; }
        .orb-2 { width: 600px; height: 600px; bottom: -250px; right: -200px; background: radial-gradient(circle, var(--accent3) 0%, transparent 70%); animation-delay: -10s; }
        .orb-3 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, var(--accent4) 0%, transparent 70%); opacity: 0.2; animation-delay: -5s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 40px 24px 60px; }
        .header { text-align: center; margin-bottom: 40px; }
        .logo-wrap { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 32px rgba(0,255,136,0.25); }
        .logo { font-size: 42px; font-weight: 900; background: linear-gradient(135deg, var(--accent), #00cc6a, var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 13px; letter-spacing: 6px; text-transform: uppercase; font-weight: 500; }
        .progress-container { margin-bottom: 32px; }
        .progress-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: var(--text-dim); }
        .progress-info span { display: flex; align-items: center; gap: 6px; }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .progress-fill::after { content: ''; position: absolute; right: 0; top: -2px; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); }
        .card { background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border); padding: 36px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
        .start-screen { text-align: center; padding: 48px 36px 52px; }
        .start-hero { position: relative; margin-bottom: 36px; }
        .hero-icon { width: 100px; height: 100px; margin: 0 auto 24px; background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(168,85,247,0.15)); border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 48px; position: relative; animation: pulse-glow 3s ease-in-out infinite; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.2), 0 20px 40px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 0 20px rgba(0,255,136,0), 0 20px 40px rgba(0,0,0,0.3); }
        }
        .hero-icon::after { content: ''; position: absolute; inset: -2px; border-radius: 30px; background: linear-gradient(135deg, var(--accent), var(--accent3)); z-index: -1; opacity: 0.5; }
        .start-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        .start-desc { color: var(--text-dim); font-size: 15px; line-height: 1.8; margin-bottom: 32px; }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 36px; }
        .feature-item { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: left; transition: all 0.3s ease; }
        .feature-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border-hover); transform: translateY(-2px); }
        .feature-icon { font-size: 20px; margin-bottom: 8px; }
        .feature-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .feature-count { font-size: 12px; color: var(--text-muted); }
        .stats-preview { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; }
        .preview-stat { text-align: center; }
        .preview-stat .value { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .preview-stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px 24px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; font-family: inherit; position: relative; overflow: hidden; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #00cc6a); color: #000; font-weight: 700; }
        .btn-primary::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.5s ease; }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,255,136,0.35); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-primary:disabled::before { display: none; }
        .question-number { position: absolute; top: 20px; right: 28px; font-size: 72px; font-weight: 900; opacity: 0.04; color: var(--accent); line-height: 1; font-family: 'Noto Sans SC', sans-serif; }
        .question-type { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .type-logic { background: rgba(0,255,136,0.12); color: var(--accent); }
        .type-pattern { background: rgba(168,85,247,0.12); color: var(--accent3); }
        .type-math { background: rgba(255,107,53,0.12); color: var(--accent2); }
        .type-brain { background: rgba(255,193,7,0.12); color: #ffc107; }
        .question-text { font-size: 19px; font-weight: 500; line-height: 1.7; margin-bottom: 28px; color: var(--text); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; gap: 14px; }
        .option:hover { background: rgba(0,255,136,0.06); border-color: rgba(0,255,136,0.3); transform: translateX(6px); }
        .option.selected { background: rgba(0,255,136,0.1); border-color: var(--accent); }
        .option.correct { background: rgba(0,255,136,0.15); border-color: var(--accent); }
        .option.wrong { background: rgba(255,107,53,0.1); border-color: var(--accent2); }
        .option-letter { width: 34px; height: 34px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; transition: all 0.25s ease; }
        .option.selected .option-letter { background: var(--accent); color: #000; }
        .option.correct .option-letter { background: var(--accent); color: #000; }
        .option.wrong .option-letter { background: var(--accent2); color: #000; }
        .option-text { font-size: 15px; line-height: 1.5; flex: 1; }
        .explanation { margin-top: 20px; padding: 16px 18px; background: rgba(0,255,136,0.05); border-radius: 12px; font-size: 14px; color: var(--text-dim); line-height: 1.7; border-left: 3px solid var(--accent); }
        .explanation.wrong { background: rgba(255,107,53,0.05); border-left-color: var(--accent2); }
        .result-container { text-align: center; }
        .result-header { margin-bottom: 32px; }
        .result-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 16px; }
        .iq-score { font-size: 110px; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 8px; letter-spacing: -4px; }
        .iq-suffix { font-size: 24px; font-weight: 300; color: var(--text-dim); margin-bottom: 20px; }
        .result-rank { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; border-radius: 30px; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .rank-genius { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2)); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .rank-excellent { background: rgba(0,255,136,0.12); color: var(--accent); border: 1px solid rgba(0,255,136,0.2); }
        .rank-good { background: rgba(168,85,247,0.12); color: var(--accent3); border: 1px solid rgba(168,85,247,0.2); }
        .rank-average { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
        .result-message { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: var(--bg-card); padding: 22px 16px; border-radius: 18px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
        .stat-value.accent { color: var(--accent); }
        .stat-value.purple { color: var(--accent3); }
        .stat-value.orange { color: var(--accent2); }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stats-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 32px; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in { animation: fadeIn 0.5s ease forwards; }
        @media (max-width: 600px) {
            .container { padding: 24px 16px 40px; }
            .card { padding: 28px 20px; border-radius: 20px; }
            .logo { font-size: 32px; }
            .logo-icon { width: 40px; height: 40px; font-size: 20px; border-radius: 12px; }
            .start-screen { padding: 32px 20px 40px; }
            .hero-icon { width: 80px; height: 80px; font-size: 40px; border-radius: 22px; }
            .start-title { font-size: 22px; }
            .question-text { font-size: 17px; }
            .iq-score { font-size: 80px; letter-spacing: -2px; }
            .stats-grid { grid-template-columns: 1fr; }
            .feature-grid { grid-template-columns: 1fr; }
            .stats-preview { gap: 20px; }
            .question-number { font-size: 56px; right: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="bg-grid"></div>
    </div>
    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-icon">🧠</div>
                <div class="logo">BRAIN</div>
            </div>
            <div class="subtitle">智商 · 逻辑 · 脑筋急转弯</div>
        </div>
        <div id="startScreen" class="card start-screen">
            <div class="start-hero">
                <div class="hero-icon">💡</div>
                <div class="start-title">准备好挑战了吗？</div>
                <div class="start-desc">
                    题库包含 20 道精心设计的题目<br>
                    每次随机挑战 20 道，涵盖逻辑推理、图形规律、<br>数学计算和脑筋急转弯
                </div>
            </div>
            <div class="feature-grid">
                <div class="feature-item">
                    <div class="feature-icon">🧩</div>
                    <div class="feature-name">逻辑推理</div>
                    <div class="feature-count">5 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📐</div>
                    <div class="feature-name">图形规律</div>
                    <div class="feature-count">5 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔢</div>
                    <div class="feature-name">数学计算</div>
                    <div class="feature-count">5 道题目</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-name">脑筋急转弯</div>
                    <div class="feature-count">5 道题目</div>
                </div>
            </div>
            <div class="stats-preview">
                <div class="preview-stat">
                    <div class="value">3</div>
                    <div class="label">总题库</div>
                </div>
                <div class="preview-stat">
                    <div class="value">3</div>
                    <div class="label">每次挑战</div>
                </div>
                <div class="preview-stat">
                    <div class="value">~1</div>
                    <div class="label">分钟</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startTest()">开始挑战 <span>→</span></button>
        </div>
        <div id="testScreen" class="hidden">
            <div class="progress-container">
                <div class="progress-info">
                    <span>题目 <span id="currentQ">1</span> / <span id="totalQ">20</span></span>
                    <span>
                        <span id="questionTimer">5s</span>
                        <span style="margin: 0 8px;">|</span>
                        <span id="timer">⏱ 0:00</span>
                    </span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 5%"></div>
                </div>
            </div>
            <div class="card" id="questionCard">
                <span class="question-number" id="qNumber">01</span>
                <span class="question-type" id="qType">逻辑</span>
                <div class="question-text" id="qText"></div>
                <div class="options" id="options"></div>
                <div class="explanation hidden" id="explanation"></div>
            </div>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一题 <span>→</span></button>
        </div>
        <div id="resultScreen" class="hidden">
            <div class="card result-container">
                <div class="result-header animate-in">
                    <div class="result-label">你的智商评估</div>
                    <div class="iq-score" id="iqScore">0</div>
                    <div class="iq-suffix">IQ</div>
                    <div class="result-rank" id="resultRank">加载中...</div>
                    <div class="result-message" id="resultMessage">正在分析你的答题表现...</div>
                </div>
                <div class="stats-grid animate-in" style="animation-delay: 0.1s">
                    <div class="stat-card">
                        <div class="stat-value accent" id="correctCount">0</div>
                        <div class="stat-label">答对</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value purple" id="accuracy">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value orange" id="totalTime">0:00</div>
                        <div class="stat-label">总用时</div>
                    </div>
                </div>
                <div class="stats-grid-2 animate-in" style="animation-delay: 0.2s">
                    <div class="stat-card">
                        <div class="stat-value accent" id="logicScore">0</div>
                        <div class="stat-label">期货知识得分</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value orange" id="brainScore">0</div>
                        <div class="stat-label">附加得分</div>
                    </div>
                </div>
                <button class="btn btn-primary animate-in" style="animation-delay: 0.3s" onclick="restartTest()">重新挑战 <span>🔄</span></button>
            </div>
        </div>
    </div>

    <script>
    const questions = [
        { type: 'logic', typeLabel: '期货知识', question: '我们是什么平台？', options: ['大粤期货', '远大期货', '中阳期货', '大奥期货'], answer: 0, explanation: '我们的平台是大粤期货！' },
        { type: 'logic', typeLabel: '期货知识', question: '我们的盘面叫什么？', options: ['金浩盘面', '智星盘面', '中阳盘面', '远大盘面'], answer: 1, explanation: '我们的盘面是智星盘面！' },
        { type: 'logic', typeLabel: '期货知识', question: '我们的软件叫什么名字？', options: ['大粤通', '智星通', '金浩通', '中阳通'], answer: 2, explanation: '我们的软件叫金浩通！' }
    ];

    let currentIndex = 0;
    let selectedAnswer = -1;
    let startTime = null;
    let correctCount = 0;
    let logicCorrect = 0;
    let brainCorrect = 0;
    let shuffledQuestions = [];
    let questionTimeLeft = 10;
    let questionTimerInterval = null;

    function shuffleArray(array) {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function startTest() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('testScreen').classList.remove('hidden');
        document.getElementById('resultScreen').classList.add('hidden');
        shuffledQuestions = shuffleArray(questions).slice(0, 3);
        document.getElementById('totalQ').textContent = shuffledQuestions.length;
        startTime = Date.now();
        updateTimer();
        showQuestion();
    }

    function updateTimer() {
        if (!startTime) return;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById('timer').textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
        if (!document.getElementById('resultScreen').classList.contains('hidden')) return;
        setTimeout(updateTimer, 1000);
    }

    // 每题10秒倒计时
    function updateQuestionTimer() {
        if (questionTimerInterval) clearInterval(questionTimerInterval);
        const timerEl = document.getElementById('questionTimer');
        if (timerEl) {
            timerEl.textContent = questionTimeLeft + 's';
            timerEl.style.color = questionTimeLeft <= 3 ? 'var(--accent2)' : 'var(--text-dim)';
        }
        questionTimerInterval = setInterval(() => {
            questionTimeLeft--;
            if (timerEl) {
                timerEl.textContent = questionTimeLeft + 's';
                timerEl.style.color = questionTimeLeft <= 3 ? 'var(--accent2)' : 'var(--text-dim)';
            }
            if (questionTimeLeft <= 0) {
                clearInterval(questionTimerInterval);
                // 时间到，自动提交（视为错误）
                if (selectedAnswer === -1) {
                    selectOption(-1); // -1 表示超时
                }
            }
        }, 1000);
    }

    function showQuestion() {
        const q = shuffledQuestions[currentIndex];
        selectedAnswer = -1;
        document.getElementById('currentQ').textContent = currentIndex + 1;
        document.getElementById('qNumber').textContent = String(currentIndex + 1).padStart(2, '0');
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / shuffledQuestions.length) * 100}%`;
        const typeEl = document.getElementById('qType');
        typeEl.textContent = q.typeLabel;
        typeEl.className = 'question-type type-' + q.type;
        
        // 显示剩余时间（10秒倒计时）
        questionTimeLeft = 5;
        updateQuestionTimer();
        
        document.getElementById('qText').textContent = q.question;
        const optionsEl = document.getElementById('options');
        const letters = ['A', 'B', 'C', 'D'];
        optionsEl.innerHTML = q.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i})">
                <span class="option-letter">${letters[i]}</span>
                <span class="option-text">${opt}</span>
            </div>
        `).join('');
        document.getElementById('explanation').classList.add('hidden');
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('nextBtn').innerHTML = currentIndex === shuffledQuestions.length - 1 ?
            '查看结果 <span>📊</span>' :
            '下一题 <span>→</span>';
        const card = document.getElementById('questionCard');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'fadeIn 0.5s ease';
    }

    function selectOption(index) {
        // 清除本题计时器
        if (questionTimerInterval) clearInterval(questionTimerInterval);
        
        selectedAnswer = index;
        const q = shuffledQuestions[currentIndex];
        
        // 超时情况
        const isTimeout = index === -1;
        const isCorrect = isTimeout ? false : index === q.answer;
        
        if (isCorrect) {
            correctCount++;
            if (q.type === 'logic' || q.type === 'math' || q.type === 'pattern') {
                logicCorrect++;
            } else {
                brainCorrect++;
            }
        }

        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.remove('selected');
            if (i === q.answer) opt.classList.add('correct');
            if (i === index && i !== q.answer) opt.classList.add('wrong');
            if (isTimeout && i !== q.answer) opt.classList.add('wrong'); // 超时：正确答案保留绿色，其他标记红色
            opt.style.pointerEvents = 'none';
        });

        const expEl = document.getElementById('explanation');
        expEl.innerHTML = isTimeout ?
            '⏰ 时间到！正确答案是：' + q.options[q.answer] + '。<br>' + (q.explanation ? q.explanation : '') :
            (isCorrect ?
            '✅ 回答正确！' + (q.explanation ? '<br>' + q.explanation : '') :
            '❌ 正确答案是：' + q.options[q.answer] + '。<br>' + (q.explanation ? q.explanation : ''));
        expEl.className = 'explanation' + (isCorrect ? '' : ' wrong');
        expEl.classList.remove('hidden');

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = false;
        nextBtn.innerHTML = currentIndex === shuffledQuestions.length - 1 ?
            '查看结果 <span>📊</span>' :
            '下一题 <span>→</span>';
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= shuffledQuestions.length) {
            showResult();
        } else {
            showQuestion();
        }
    }

    function showResult() {
        document.getElementById('testScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        const iq = 85 + (correctCount * 5);
        const finalIQ = Math.min(Math.max(iq, 60), 160);
        document.getElementById('iqScore').textContent = finalIQ;
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('accuracy').textContent = Math.round((correctCount / shuffledQuestions.length) * 100) + '%';
        document.getElementById('totalTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        document.getElementById('logicScore').textContent = logicCorrect + '/3';
        document.getElementById('brainScore').textContent = brainCorrect + '/0';
        const rankEl = document.getElementById('resultRank');
        const msgEl = document.getElementById('resultMessage');
        const score = finalIQ;
        if (score >= 140) {
            rankEl.innerHTML = '🌟 天才级别';
            rankEl.className = 'result-rank rank-genius';
            msgEl.textContent = '太厉害了！你的智商超过了 99% 的人！';
        } else if (score >= 120) {
            rankEl.innerHTML = '🧠 优秀';
            rankEl.className = 'result-rank rank-excellent';
            msgEl.textContent = '表现出色！你的逻辑思维非常强！';
        } else if (score >= 100) {
            rankEl.innerHTML = '👍 良好';
            rankEl.className = 'result-rank rank-good';
            msgEl.textContent = '不错的成绩，继续保持！';
        } else {
            rankEl.innerHTML = '💪 继续加油';
            rankEl.className = 'result-rank rank-average';
            msgEl.textContent = '多练习几次，你会越来越好的！';
        }
    }

    function restartTest() {
        currentIndex = 0;
        correctCount = 0;
        logicCorrect = 0;
        brainCorrect = 0;
        startTime = Date.now();
        document.getElementById('resultScreen').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
    }
    </script>
</body>
</html>
